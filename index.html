<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triqui Challenge</title>
  <style>
    :root {
      --bg: #95d7d7;
      --panel: #9af0e4;
      --line: #1738b6;
      --accent: #39db53;
      --text: #1f1f1f;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #dcdcdc;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .phone {
      position: relative;
      width: min(100%, 420px);
      height: min(740px, calc(100vh - 28px));
      height: min(740px, calc(100dvh - 28px));
      background: var(--bg);
      border: 2px solid #1b1b1b;
      overflow-x: hidden;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }
    .topbar {
      height: 28px;
      background: #2f48c5;
    }
    .screen {
      display: none;
      padding: 14px 10px 18px;
    }
    .screen.active {
      display: block;
    }
    .panel {
      border: 2px solid #111;
      background: var(--panel);
      padding: 10px;
      margin-bottom: 14px;
    }
    .board {
  width: min(90vw, 360px);
}
button {
  touch-action: manipulation;
}
body {
  font-size: clamp(14px, 2.5vw, 18px);
}
    .menu-grid {
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
}
    .menu-col {
      border: 2px solid #111;
      background: #b6ffe2;
      padding: 8px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }
    .cat-btn {
      border: 1px solid #2a2a2a;
      background: #95f0ea;
      font-size: 14px;
      text-transform: uppercase;
      padding: 6px 6px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      min-width: 0;
      gap: 8px;
    }
    .cat-btn.selected {
      border: 2px solid #1738b6;
      background: #d7fffb;
      font-weight: 700;
    }
    .cat-btn .cat-label {
      flex: 1;
      min-width: 0;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cat-btn .cat-icon {
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
      min-width: 38px;
      height: 26px;
      background: linear-gradient(90deg, #ff4b4b, #66a9ff);
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      border: 1px solid rgba(0, 0, 0, 0.25);
    }
    .cat-btn:nth-child(2n) .cat-icon {
      background: linear-gradient(90deg, #6ac0ff, #937bff);
    }
    .cat-btn:nth-child(3n) .cat-icon {
      background: linear-gradient(90deg, #f8d95d, #94df5f);
    }
    .main-btn {
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #1b7f2e;
      background: var(--accent);
      font-size: 20px;
      cursor: pointer;
      margin: 8px auto 0;
      display: block;
    }
    .form-row {
      display: grid;
      grid-template-columns: minmax(86px, 110px) 1fr;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    label {
      font-size: clamp(18px, 4.8vw, 28px);
      color: #2f2f2f;
    }
    input[type="text"] {
      width: 100%;
      border: 1px solid #6f6f6f;
      background: #e7e7e7;
      font-size: clamp(16px, 4vw, 22px);
      padding: 4px 8px;
    }
    .score-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 6px;
    }
    .score-box {
      border: 1px solid #3b3b3b;
      background: #c0f3d5;
      padding: 6px;
      text-align: center;
    }
    .score-name {
      font-size: 14px;
      margin-bottom: 2px;
    }
    .score-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }
    .category-text {
      text-align: center;
      font-size: 20px;
      margin: 2px 0 0;
    }
    .difficulty-text {
      text-align: center;
      font-size: 16px;
      margin: 6px 0 0;
      color: #1738b6;
      font-weight: 700;
    }
    .difficulty-selector {
      margin-top: 8px;
      display: grid;
      gap: 6px;
      justify-items: center;
    }
    .difficulty-selector-label {
      font-size: 14px;
      font-weight: 700;
      color: #204099;
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }
    .difficulty-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .difficulty-btn {
      border: 1px solid #2a2a2a;
      background: #e9fff5;
      font-size: 14px;
      font-weight: 600;
      padding: 7px 12px;
      cursor: pointer;
      min-width: 88px;
    }
    .difficulty-btn.selected {
      border: 2px solid #1738b6;
      background: #d7fffb;
    }
    #status {
      text-align: center;
      font-size: clamp(22px, 6vw, 30px);
      margin: 8px 0 10px;
      color: #2f2f2f;
      min-height: 56px;
      display: grid;
      place-items: center;
    }
    .board-wrap {
      display: grid;
      place-items: center;
    }
    .board {
      display: grid;
      width: min(100%, 296px);
      aspect-ratio: 1 / 1;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      border: 4px solid var(--line);
      background: #b4ffff;
    }
    .cell {
      border: 2px solid var(--line);
      background: #cbffff;
      color: #111;
      font-size: clamp(40px, 13vw, 62px);
      line-height: 1;
      cursor: pointer;
      font-family: "Segoe UI", sans-serif;
      transition: transform 0.08s ease;
      aspect-ratio: 1 / 1;
    }
    .cell:active {
      transform: scale(0.96);
    }
    .cell.win {
      background: #ffe788;
    }
    .controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .controls button {
      border: 1px solid #2a5d2a;
      background: #b6efb4;
      font-size: clamp(16px, 4.4vw, 18px);
      padding: 8px 4px;
      cursor: pointer;
    }
    .controls button.primary {
      background: var(--accent);
      border-color: #1b7f2e;
      font-weight: 600;
    }
    .question-overlay {
      position: absolute;
      inset: 28px 0 0 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.45);
      padding: 14px;
      z-index: 20;
    }
    .question-overlay.active {
      display: grid;
    }
    .question-card {
      width: 100%;
      max-width: 500px;
      border: 2px solid #111;
      background: #b7fff2;
      padding: 10px;
    }
    @media (min-width: 768px) {
  .controls {
    grid-template-columns: repeat(3, 1fr);
  }
.phone {
  border-radius: 20px;
}
  .form-row {
    grid-template-columns: 150px 1fr;
  }
}
    .question-category {
      font-weight: 700;
      color: #1738b6;
      font-size: 16px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .question-difficulty {
      font-weight: 700;
      color: #1738b6;
      font-size: 15px;
      margin-bottom: 6px;
    }
    .question-timer {
      font-weight: 700;
      color: #b01818;
      font-size: 16px;
      margin-bottom: 8px;
    }
    #questionText {
      margin: 0 0 10px;
      font-size: 21px;
      line-height: 1.2;
    }
    .options-container {
      display: grid;
      gap: 8px;
    }
    .option-btn {
      border: 1px solid #2a2a2a;
      background: #e9fff5;
      font-size: 16px;
      text-align: left;
      padding: 9px 10px;
      cursor: pointer;
    }
    .option-btn:hover {
      background: #d6f5ff;
    }
    .answer-feedback {
      position: absolute;
      inset: 28px 0 0 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.45);
      padding: 14px;
      z-index: 25;
    }
    .answer-feedback.active {
      display: grid;
    }
    .answer-card {
      width: 90%;
      max-width: 300px;
      border: 2px solid #111;
      text-align: center;
      font-weight: 700;
      padding: 20px 12px;
      color: #132;
      display: grid;
      gap: 14px;
      justify-items: center;
    }
    .answer-result {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
    }
    .feedback-continue-btn {
      border: 1px solid #1b7f2e;
      background: var(--accent);
      font-size: 18px;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      border-radius: 8px;
    }
    .answer-card.correct {
      background: #98ff95;
    }
    .answer-card.wrong {
      background: #ffb2b2;
      color: #501;
    }
    @media (max-width: 520px) {
      body {
        padding: 8px;
      }
      .phone {
  width: 100%;
  max-width: 900px; /* opcional para desktop */
  min-height: 100vh;
  background: var(--bg);
  border: none;
  overflow-x: hidden;
  overflow-y: auto;
  box-shadow: none;
}
      .menu-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 420px) {
      .screen {
        padding: 12px 8px 16px;
      }
      .panel {
        padding: 8px;
      }
      .form-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .controls {
        grid-template-columns: 1fr;
      }
      .main-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="topbar"></div>

    <section id="menuScreen" class="screen active">
      <div class="panel">
        <div class="menu-grid">
          <div class="menu-col">
            <button class="cat-btn selected" data-category="historia"><span class="cat-label">Historia</span><span class="cat-icon">📜</span></button>
            <button class="cat-btn" data-category="deportes"><span class="cat-label">Deportes</span><span class="cat-icon">🏋️</span></button>
            <button class="cat-btn" data-category="entretenimiento"><span class="cat-label">Entretenimiento</span><span class="cat-icon">🎪</span></button>
          </div>
          <div class="menu-col">
            <button class="cat-btn" data-category="ciencias"><span class="cat-label">Ciencias</span><span class="cat-icon">🧪</span></button>
            <button class="cat-btn" data-category="geografia"><span class="cat-label">Geografía</span><span class="cat-icon">🌍</span></button>
            <button class="cat-btn" data-category="random"><span class="cat-label">Random</span><span class="cat-icon">❓</span></button>
          </div>
        </div>
      </div>
      <div class="panel" style="text-align: center;">
        <button id="continueBtn" class="main-btn">Continuar</button>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="panel">
        <div class="form-row">
          <label for="player1">Jugador 1</label>
          <input id="player1" type="text" value="Jugador 1" maxlength="12" />
        </div>
        <div class="form-row">
          <label for="player2">Jugador 2</label>
          <input id="player2" type="text" value="Jugador 2" maxlength="12" />
        </div>
        <div class="score-panel">
          <div class="score-box">
            <div id="scoreNameX" class="score-name">Jugador 1 (X)</div>
            <div id="scoreX" class="score-value">0</div>
          </div>
          <div class="score-box">
            <div id="scoreNameO" class="score-name">Jugador 2 (O)</div>
            <div id="scoreO" class="score-value">0</div>
          </div>
        </div>
      </div>
      <div class="panel">
        <p class="category-text">Categorías seleccionadas: <strong id="selectedCategoryLabel">Historia</strong></p>
        <div class="difficulty-selector" aria-label="Selector de dificultad">
          <span class="difficulty-selector-label">Dificultad</span>
          <div class="difficulty-options">
            <button class="difficulty-btn selected" data-difficulty="medio" type="button">Medio</button>
            <button class="difficulty-btn" data-difficulty="dificil" type="button">Difícil</button>
            <button class="difficulty-btn" data-difficulty="experto" type="button">Experto</button>
          </div>
        </div>
        <p id="difficultyLabel" class="difficulty-text">Nivel seleccionado: Medio</p>
      </div>

      <h2 id="status">Pulsa para Empezar</h2>

      <div class="board-wrap">
        <div id="board" class="board" aria-label="Tablero de triqui">
          <button class="cell" data-index="0" aria-label="Casilla 1"></button>
          <button class="cell" data-index="1" aria-label="Casilla 2"></button>
          <button class="cell" data-index="2" aria-label="Casilla 3"></button>
          <button class="cell" data-index="3" aria-label="Casilla 4"></button>
          <button class="cell" data-index="4" aria-label="Casilla 5"></button>
          <button class="cell" data-index="5" aria-label="Casilla 6"></button>
          <button class="cell" data-index="6" aria-label="Casilla 7"></button>
          <button class="cell" data-index="7" aria-label="Casilla 8"></button>
          <button class="cell" data-index="8" aria-label="Casilla 9"></button>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn" class="primary">Iniciar</button>
        <button id="nextRoundBtn">Otra ronda</button>
        <button id="newGameBtn">Nuevo juego</button>
      </div>
    </section>

    <div id="questionOverlay" class="question-overlay" aria-live="polite">
      <div class="question-card">
        <div id="questionCategory" class="question-category">Categoría: Historia</div>
        <div id="questionDifficulty" class="question-difficulty">Nivel: Medio</div>
        <div id="questionTimer" class="question-timer">Tiempo: 15s</div>
        <p id="questionText"></p>
        <div id="optionsContainer" class="options-container"></div>
      </div>
    </div>
    <div id="answerFeedback" class="answer-feedback" aria-live="polite">
      <div id="answerCard" class="answer-card">
        <p id="answerText" class="answer-result">¡Correcto!</p>
        <button id="answerContinueBtn" class="feedback-continue-btn" type="button">Continuar</button>
      </div>
    </div>
  </main>

  <script>
    const menuScreen = document.getElementById("menuScreen");
    const gameScreen = document.getElementById("gameScreen");
    const continueBtn = document.getElementById("continueBtn");

      [0, 1, 2],

    const questionBank = {

        { text: "¿Qué videojuego de Valve popularizó el género MOBA moderno competitivo junto a LoL?", options: ["Team Fortress 2", "Dota 2", "Counter-Strike", "Artifact"], answer: 1 },
        { text: "¿Qué actor interpreta a Tony Soprano en 'The Sopranos'?", options: ["Edie Falco", "James Gandolfini", "Michael Imperioli", "Steve Buscemi"], answer: 1 },
        { text: "¿Qué canción de Queen está estructurada como mini-ópera rock y salió en 1975?", options: ["Somebody to Love", "Bohemian Rhapsody", "We Are the Champions", "Killer Queen"], answer: 1 },
        { text: "¿Qué película de Denis Villeneuve adapta la novela de Frank Herbert?", options: ["Arrival", "Blade Runner 2049", "Dune", "Sicario"], answer: 2 },
        { text: "¿Cuál es la consola de Nintendo lanzada en 2017 con concepto híbrido?", options: ["Wii U", "Switch", "3DS", "GameCube"], answer: 1 },
        { text: "¿Qué saga cinematográfica incluye a Ethan Hunt como protagonista?", options: ["Bourne", "Misión: Imposible", "Jack Reacher", "Kingsman"], answer: 1 },
        { text: "¿Qué actor interpretó a Oppenheimer en la película de 2023?", options: ["Cillian Murphy", "Matt Damon", "Benedict Cumberbatch", "Adam Driver"], answer: 0 }
      ]
    };

    const names = { X: "Jugador 1", O: "Jugador 2" };
    const scores = { X: 0, O: 0 };
    const usedQuestions = {
      historia: new Set(),
      deportes: new Set(),
      ciencias: new Set(),
      geografia: new Set(),
      entretenimiento: new Set()
    };
    let board = Array(9).fill("");
    let active = false;
    let current = "X";
    const selectedCategories = new Set(["historia"]);
    let questionOpen = false;
    let feedbackOpen = false;
    let pendingMoveIndex = null;
    let pendingAnswerResolution = null;
    let activeQuestion = null;
    let questionTimerId = null;
    let questionTimeLeft = 15;
    const QUESTION_TIME_LIMIT = 15;
    let roundNumber = 0;
    let currentDifficulty = "medio";

    function syncNames() {
      names.X = player1Input.value.trim() || "Jugador 1";
      names.O = player2Input.value.trim() || "Jugador 2";
      scoreNameX.textContent = `${names.X} (X)`;
      scoreNameO.textContent = `${names.O} (O)`;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateScores() {
      scoreXEl.textContent = String(scores.X);
      scoreOEl.textContent = String(scores.O);
    }

    function clearWinMarks() {
      cells.forEach((cell) => cell.classList.remove("win"));
    }

    function render() {
      cells.forEach((cell, index) => {
        cell.textContent = board[index];
        cell.disabled = !active || board[index] !== "" || questionOpen || feedbackOpen;
      });
    }
    function toggleCategory(category) {
      if (selectedCategories.has(category)) {
        if (selectedCategories.size === 1) return;
        selectedCategories.delete(category);
      } else {
        selectedCategories.add(category);
      }
      updateSelectedCategoriesUI();
    }

    function getWinnerPattern() {
      for (const pattern of patterns) {
        const [a, b, c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return pattern;
        }
      }
      return null;
    }
    function updateSelectedCategoriesUI() {
      const selectedList = Array.from(selectedCategories);
      selectedCategoryLabel.textContent = selectedList
        .map((category) => categoryLabels[category])
        .join(", ");
      categoryButtons.forEach((button) => {
        button.classList.toggle("selected", selectedCategories.has(button.dataset.category));
      });
    }

    function resetQuestionHistory() {
      baseCategories.forEach((category) => usedQuestions[category].clear());
    }

    function getQuestionLevelByIndex(index, totalQuestions) {
      const mediumLimit = Math.ceil(totalQuestions / 3);
      const hardLimit = Math.ceil((totalQuestions * 2) / 3);
      if (index < mediumLimit) return "medio";
      if (index < hardLimit) return "dificil";
      return "experto";
    }

    function updateDifficultyUI() {
      difficultyLabel.textContent =
        roundNumber > 0
          ? `Nivel seleccionado: ${difficultyLabels[currentDifficulty]} · Ronda ${roundNumber}`
          : `Nivel seleccionado: ${difficultyLabels[currentDifficulty]}`;
      difficultyButtons.forEach((button) => {
        button.classList.toggle("selected", button.dataset.difficulty === currentDifficulty);
      });
    }

    function getQuestionCategories() {
      return selectedCategories.has("random") ? baseCategories : Array.from(selectedCategories);
    }
    function hasAvailableQuestions() {
      const categories = getQuestionCategories();
      return categories.some((category) =>
        questionBank[category].some(
          (_, index) =>
            getQuestionLevelByIndex(index, questionBank[category].length) === currentDifficulty
        )
      );
    }

    function getRandomQuestion() {
      const categories = getQuestionCategories();
      const buildCandidates = () => {
        const candidates = [];
        categories.forEach((category) => {
          questionBank[category].forEach((question, index) => {
            const questionLevel = getQuestionLevelByIndex(index, questionBank[category].length);
            if (!usedQuestions[category].has(index) && questionLevel === currentDifficulty) {
              candidates.push({ ...question, category, index, level: questionLevel });
            }
          });
        });
        return candidates;
      };

      let candidates = buildCandidates();

      if (candidates.length === 0) {
        categories.forEach((category) => {
          questionBank[category].forEach((_, index) => {
            if (getQuestionLevelByIndex(index, questionBank[category].length) === currentDifficulty) {
              usedQuestions[category].delete(index);
            }
          });
        });
        candidates = buildCandidates();
      }

      if (candidates.length === 0) return null;

      const randomIndex = Math.floor(Math.random() * candidates.length);
      const chosen = candidates[randomIndex];
      usedQuestions[chosen.category].add(chosen.index);
      return chosen;
    }
    function updateQuestionTimerDisplay() {
      questionTimerEl.textContent = `Tiempo: ${questionTimeLeft}s`;
    }

    function stopQuestionTimer(resetTime = true) {
      if (questionTimerId) {
        clearInterval(questionTimerId);
        questionTimerId = null;
      }
      if (resetTime) {
        questionTimeLeft = QUESTION_TIME_LIMIT;
        updateQuestionTimerDisplay();
      }
    }

    function startQuestionTimer() {
      stopQuestionTimer(false);
      questionTimeLeft = QUESTION_TIME_LIMIT;
      updateQuestionTimerDisplay();

      questionTimerId = setInterval(() => {
        questionTimeLeft -= 1;
        updateQuestionTimerDisplay();
        if (questionTimeLeft <= 0) {
          stopQuestionTimer(false);
          handleAnswer(-1);
        }
      }, 1000);
    }

    function hideQuestionOverlay() {
      stopQuestionTimer();
      questionOverlay.classList.remove("active");
      questionOpen = false;
      activeQuestion = null;
      optionsContainer.innerHTML = "";
    }

    function showAnswerFeedback(isCorrect, wasTimeout = false) {
      feedbackOpen = true;
      answerCard.classList.remove("correct", "wrong");
      if (isCorrect) {
        answerCard.classList.add("correct");
        answerText.textContent = "¡Correcto!";
      } else {
        answerCard.classList.add("wrong");
        answerText.textContent = wasTimeout ? "¡Tiempo agotado! Incorrecto." : "¡Incorrecto!";
      }
      answerFeedback.classList.add("active");
      render();
    }

    function hideAnswerFeedback() {
      answerFeedback.classList.remove("active");
      answerCard.classList.remove("correct", "wrong");
      feedbackOpen = false;
      answerText.textContent = "";
    }

    function continueAfterAnswerFeedback() {
      if (!pendingAnswerResolution) {
        hideAnswerFeedback();
        render();
        return;
      }

      const { isCorrect, moveIndex } = pendingAnswerResolution;
      pendingAnswerResolution = null;
      hideAnswerFeedback();

      if (!active) {
        render();
        return;
      }
      if (isCorrect) {
        resolveCorrectAnswer(moveIndex);
      } else {
        resolveWrongAnswer();
      }
    }

    function showQuestionForCell(index) {
      pendingMoveIndex = index;
      activeQuestion = getRandomQuestion();
      if (!activeQuestion) {
        pendingMoveIndex = null;
        active = false;
        setStatus("No hay preguntas para esta dificultad en las categorías elegidas.");
        render();
        return;
      }
      questionOpen = true;

      questionCategoryEl.textContent = `Categoría: ${categoryLabels[activeQuestion.category]}`;
      questionDifficultyEl.textContent = `Nivel: ${difficultyLabels[activeQuestion.level]}`;
      questionTextEl.textContent = activeQuestion.text;
      optionsContainer.innerHTML = "";

      activeQuestion.options.forEach((option, optionIndex) => {
        const optionButton = document.createElement("button");
        optionButton.className = "option-btn";
        optionButton.type = "button";
        optionButton.textContent = option;
        optionButton.addEventListener("click", () => handleAnswer(optionIndex));
        optionsContainer.appendChild(optionButton);
      });

      questionOverlay.classList.add("active");
      startQuestionTimer();
      setStatus(`Pregunta para ${names[current]} (${current})`);
      render();
    }

    function resolveCorrectAnswer(moveIndex) {
      board[moveIndex] = current;
      const winnerPattern = getWinnerPattern();

      if (winnerPattern) {
        winnerPattern.forEach((cellIndex) => cells[cellIndex].classList.add("win"));
        scores[current] += 1;
        updateScores();
        finishRound(`¡${names[current]} gana!`);
        return;
      }

      if (board.every(Boolean)) {
        finishRound("Empate");
        return;
      }

      current = current === "X" ? "O" : "X";
      setStatus(`Correcto. Turno de ${names[current]} (${current})`);
      render();
    }

    function resolveWrongAnswer() {
      current = current === "X" ? "O" : "X";
      setStatus(`Incorrecto. Turno de ${names[current]} (${current})`);
      render();
    }

    function handleAnswer(optionIndex) {
      if (!questionOpen || !activeQuestion || pendingMoveIndex === null) return;

      const moveIndex = pendingMoveIndex;
      const isCorrect = optionIndex === activeQuestion.answer;
      const wasTimeout = optionIndex === -1;

      pendingMoveIndex = null;
      hideQuestionOverlay();

      if (!active) return;
      pendingAnswerResolution = { isCorrect, moveIndex };
      showAnswerFeedback(isCorrect, wasTimeout);
      setStatus("Pulsa Continuar para seguir");
    }

    function beginRound() {
      syncNames();
      roundNumber += 1;
      updateDifficultyUI();
      board = Array(9).fill("");
      clearWinMarks();
      pendingMoveIndex = null;
      pendingAnswerResolution = null;
      hideQuestionOverlay();
      hideAnswerFeedback();
      if (!hasAvailableQuestions()) {
        active = false;
        setStatus("No hay preguntas para esta dificultad en las categorías elegidas.");
        render();
        return;
      }
      active = true;
      current = Math.random() < 0.5 ? "X" : "O";
      setStatus(`Turno de ${names[current]} (${current})`);
      render();
    }

    function finishRound(message) {
      active = false;
      setStatus(message);
      render();
    }

    function onCellClick(index) {
      if (!active || board[index] || questionOpen || feedbackOpen) return;
      showQuestionForCell(index);
    }

    continueBtn.addEventListener("click", () => {
      menuScreen.classList.remove("active");
      gameScreen.classList.add("active");
      setStatus("Pulsa Iniciar");
    });
    categoryButtons.forEach((button) => {
      button.addEventListener("click", () => toggleCategory(button.dataset.category));
    });
    difficultyButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentDifficulty = button.dataset.difficulty;
        updateDifficultyUI();
      });
    });

    cells.forEach((cell, index) => {
      cell.addEventListener("click", () => onCellClick(index));
    });
    answerContinueBtn.addEventListener("click", continueAfterAnswerFeedback);

    player1Input.addEventListener("input", syncNames);
    player2Input.addEventListener("input", syncNames);

    startBtn.addEventListener("click", beginRound);
    nextRoundBtn.addEventListener("click", beginRound);
    newGameBtn.addEventListener("click", () => {
      scores.X = 0;
      scores.O = 0;
      resetQuestionHistory();
      updateScores();
      board = Array(9).fill("");
      clearWinMarks();
      pendingMoveIndex = null;
      pendingAnswerResolution = null;
      hideQuestionOverlay();
      hideAnswerFeedback();
      active = false;
      setStatus("Pulsa Iniciar");
      render();
      gameScreen.classList.remove("active");
      menuScreen.classList.add("active");
      roundNumber = 0;
      updateDifficultyUI();
    });
    updateSelectedCategoriesUI();

    syncNames();
    updateScores();
    updateDifficultyUI();
    render();
  </script>
